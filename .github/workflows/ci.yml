# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [master, development]   # PRs *targeting* these branches
  push:
    branches: [development]           # optional: also test direct pushes to development

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/