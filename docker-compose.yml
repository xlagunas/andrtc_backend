services:
  db:
    image: mariadb:12
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal          # NOMÉS interna → aïllada del proxy

  viv-backend:
    build: .                                                    # dev: construeix la imatge localment
    image: ghcr.io/xlagunas/andrtc_backend:${APP_TAG:-latest}   # prod: fa pull d'aquesta imatge
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/viv?useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      # loopback: accessible localment (dev) i al VPS per depurar, però MAI públic.
      # A prod, Caddy hi arriba per la xarxa "web", no per aquest port.
      - "127.0.0.1:8080:8080"
    networks:
      - web               # perquè Caddy hi arribi (resol per l'àlies "viv-backend")
      - internal          # per parlar amb la DB

volumes:
  db-data:

networks:
  web:
    external: true
  internal:
